<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="1등꼴등 게임 — 30초 관람형 파티게임" />
    <title>1등꼴등 게임</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
        touch-action: none;
      }
      #game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      /* HTML overlay for name input (above canvas) */
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
      #ui-overlay > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
