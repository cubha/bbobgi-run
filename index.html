<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="1등꼴등 게임 — 30초 관람형 파티게임" />
    <title>뽑기런</title>
    <style>
      @font-face {
        font-family: 'Galmuri11';
        src: url('/node_modules/galmuri/dist/Galmuri11.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Galmuri11';
        src: url('/node_modules/galmuri/dist/Galmuri11-Bold.woff2') format('woff2');
        font-weight: 700;
        font-display: swap;
      }
      @font-face {
        font-family: 'Galmuri14';
        src: url('/node_modules/galmuri/dist/Galmuri14.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: 'Galmuri7';
        src: url('/node_modules/galmuri/dist/Galmuri7.woff2') format('woff2');
        font-weight: 400;
        font-display: swap;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
      #game-container {
        width: 100%;
        height: 100%;
        position: relative;
        touch-action: none;
      }
      #game-container canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      /* HTML overlay for name input (above canvas) */
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
      #ui-overlay > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-overlay"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
